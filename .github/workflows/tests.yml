name: tests

# Run on every push and on PRs to main. Pytest fixtures use only
# synthetic data (no FCC / Census / Google credentials needed at test
# time), so CI doesn't need any secrets configured in GitHub.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # `--extra dev` pulls in pytest + pytest-mock + ruff (declared in
        # [project.optional-dependencies] in pyproject.toml). CI doesn't
        # need credentials — every test that touches FCC / Census / Google
        # is monkeypatched against synthetic fixtures.
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest -q --no-header

      - name: Run ruff (lint only, non-blocking on style)
        run: uv run ruff check --output-format=github . || true
